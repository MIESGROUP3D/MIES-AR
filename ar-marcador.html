<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MIES-AR · AR sobre marcador</title>

    <!-- Versiones compatibles: MindAR 1.2.5 está hecho para A-Frame 1.3.0 -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="./analytics.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
        a-scene { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; }
        a-scene .a-canvas { width: 100% !important; height: 100% !important; }
        a-scene video {
            position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important; object-fit: cover !important;
        }
        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center; gap: 10px;
            padding: calc(14px + env(safe-area-inset-top)) 18px 12px; pointer-events: none; }
        .badge { width: 34px; height: 34px; border-radius: 9px; background: #fff; display: grid; place-items: center; box-shadow: 0 2px 10px rgba(0,0,0,.4); }
        .badge svg { width: 18px; height: 18px; color: #000; }
        .brand { color: #fff; font-weight: 800; letter-spacing: .02em; text-shadow: 0 1px 6px rgba(0,0,0,.7); }
        .back { position: fixed; top: calc(14px + env(safe-area-inset-top)); right: 16px; z-index: 21; pointer-events: auto;
            color: #fff; text-decoration: none; font-size: 13px; background: rgba(10,10,12,.7); border: 1px solid rgba(255,255,255,.25);
            padding: 8px 14px; border-radius: 9999px; backdrop-filter: blur(8px); }
        .overlay { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; display: flex; justify-content: center;
            padding: 18px 18px calc(22px + env(safe-area-inset-bottom)); pointer-events: none; }
        .card { background: rgba(10,10,12,.78); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 14px;
            padding: 12px 16px; font-size: 13.5px; line-height: 1.4; backdrop-filter: blur(10px); text-align: center; max-width: 340px; }
        .card b { color: #fff; }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></span>
        <span class="brand">MIES-AR</span>
    </div>
    <a class="back" href="./">✕ Salir</a>

    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes; maxTrack: 1"
        color-space="sRGB"
        embedded
        renderer="colorManagement: true, physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 1.1"></a-entity>
        <a-entity light="type: directional; intensity: 0.9" position="1 2 1"></a-entity>

        <!-- Marcadores: el modelo se CARGA solo cuando se detecta su tarjeta (lazy-load) -->
        <a-entity class="marker" mindar-image-target="targetIndex: 0" data-name="Optimus Prime" data-model="./bumblebee_-_optimus_prime_transform_animation.glb" data-scale="2.8" data-yaw="0"></a-entity>
        <a-entity class="marker" mindar-image-target="targetIndex: 1" data-name="Maqueta 1" data-model="./city.glb" data-scale="2.8" data-yaw="0"></a-entity>
        <a-entity class="marker" mindar-image-target="targetIndex: 2" data-name="Maqueta 2" data-model="./city2.glb" data-scale="2.8" data-yaw="0"></a-entity>
        <a-entity class="marker" mindar-image-target="targetIndex: 3" data-name="Lamborghini" data-model="./lamborghini.glb" data-scale="2.8" data-yaw="90"></a-entity>
        <a-entity class="marker" mindar-image-target="targetIndex: 4" data-name="Apartamento 1" data-model="./apartamento1.glb" data-scale="2.8" data-yaw="0"></a-entity>
    </a-scene>

    <div class="overlay">
        <div class="card">📸 Apunta la cámara a <b>cualquiera de las tarjetas</b> y su modelo aparecerá encima.</div>
    </div>

    <script>
        // Carga el modelo solo la primera vez que se detecta su marcador
        window.addEventListener('DOMContentLoaded', () => {
            if (window.miesTrack) window.miesTrack('marker_ar_open', {});
            document.querySelectorAll('.marker').forEach((el) => {
                el.addEventListener('targetFound', () => {
                    if (window.miesTrack) window.miesTrack('marker_scan', { modelo: el.dataset.name });
                    if (el.dataset.loaded) return;
                    el.dataset.loaded = '1';
                    const s = el.dataset.scale;
                    const wrap = document.createElement('a-entity');
                    wrap.setAttribute('rotation', '90 0 0');
                    const model = document.createElement('a-gltf-model');
                    model.setAttribute('src', el.dataset.model);
                    model.setAttribute('position', '0 0 0');
                    model.setAttribute('rotation', '0 ' + (el.dataset.yaw || '0') + ' 0');
                    model.setAttribute('scale', s + ' ' + s + ' ' + s);
                    model.setAttribute('animation-mixer', 'clip: *; loop: repeat');
                    wrap.appendChild(model);
                    el.appendChild(wrap);
                });
            });
        });
    </script>
</body>
</html>
